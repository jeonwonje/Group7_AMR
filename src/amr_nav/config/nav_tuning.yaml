auto_nav:
  ros__parameters:
    rotate_speed: 1.75           # rad/s — 360° spin speed
    drive_speed: 0.15            # m/s — straight-line drive speed
    wall_threshold: 10           # occupancy grid value >= this → wall
    distance_threshold: 35       # max Dijkstra cost (grid cells)
    wall_penalty: 5              # A* wall neighbourhood radius
    wall_cost: 200               # A* cost multiplier per nearby wall cell
    cluster_distance: 6          # min waypoint spacing (grid cells)
    localization_tolerance: 4    # arrival tolerance (grid cells)
    stop_distance: 0.25          # LiDAR emergency stop (metres)
    reset_visited_threshold: 500 # clear visited set after this many entries
    tag_approach_distance: 0.35  # stop this far from marker (metres)
    recovery_duration: 6.0       # 360° spin time (seconds)
