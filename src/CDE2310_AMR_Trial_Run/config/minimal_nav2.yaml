# 1. BEHAVIOR TREE NAVIGATOR
bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom

# 1b. SMOOTHER SERVER
smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      do_refinement: true
      max_its: 1000

# 2. BEHAVIOR SERVER (Recoveries)
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 5.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
      max_rotational_vel: 0.5
      min_rotational_vel: 0.2
      rotational_acc_lim: 0.4
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 2.0
    use_sim_time: False

# 3. GLOBAL PLANNER
planner_server:
  ros__parameters:
    expected_planner_frequency: 2.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.5
      allow_unknown: true
      max_iterations: 50000
      max_on_approach_iterations: 1000
      max_planning_time: 3.0
      smoother_cost_weight: 15.0      # Very high — smoother pushes path away from cost
      smoother_w_data: 0.2            # Low — path can deviate from A* to avoid cost
      smoother_w_smooth: 0.05         # Almost no smoothing — don't curve into inflated area
      cost_travel_multiplier: 50.0    # Extreme — treat any inflated cell as nearly impassable

# 4. LOCAL CONTROLLER
# 0.38m corridors, 0.32m robot, 0.03m clearance per side.
# No collision detection (causes oscillation at 5Hz).
# No rotation shim (causes oscillation).
# Slow speed, far lookahead, gentle turns.
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 5.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.10
      movement_time_allowance: 30.0
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.30
      stateful: True
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.06
      max_angular_vel: 0.3
      max_linear_accel: 0.2
      max_linear_decel: 0.3
      max_angular_accel: 0.2
      lookahead_dist: 0.35
      min_lookahead_dist: 0.20
      max_lookahead_dist: 0.50
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: true
      transform_tolerance: 2.0
      min_approach_linear_velocity: 0.03
      use_collision_detection: false
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_gain: 3.0
      regulated_linear_scaling_min_radius: 0.2
      regulated_linear_scaling_min_speed: 0.02
      rotate_to_heading_min_angle: 1.5
      allow_reversing: false

# 5. GLOBAL COSTMAP
# 0.38m corridors, 0.32m robot.
# robot_radius 0.16 = exact half of robot. Lethal = can't plan here.
# Leaves 0.38 - 0.32 = 0.06m total = 0.03m per side.
# inflation_radius 0.03 fills the remaining clearance.
# cost_scaling 0.5 = cost stays high, path forced to dead center.
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 0.5
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      robot_radius: 0.15
      resolution: 0.025
      transform_tolerance: 2.0
      track_unknown_space: true
      always_send_full_costmap: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 0.1
        inflation_radius: 0.25

# 6. LOCAL COSTMAP
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.025
      transform_tolerance: 2.0
      robot_radius: 0.15
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 0.1
        inflation_radius: 0.25
