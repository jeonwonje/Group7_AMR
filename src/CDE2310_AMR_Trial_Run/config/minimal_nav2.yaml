# 1. BEHAVIOR TREE NAVIGATOR
bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom

# 1b. SMOOTHER SERVER
smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      do_refinement: true
      max_its: 1000

# 2. BEHAVIOR SERVER (Recoveries)
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 5.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
      max_rotational_vel: 0.5
      min_rotational_vel: 0.2
      rotational_acc_lim: 0.4
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 2.0
    use_sim_time: False

# 3. GLOBAL PLANNER
planner_server:
  ros__parameters:
    expected_planner_frequency: 2.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false        # Dijkstra — smooth potential field centers paths in corridors
      allow_unknown: true
      cost_factor: 0.35       # Lower = more sensitive to inflated cost = wider turns at corners
      neutral_cost: 50        # Lower neutral cost amplifies the cost gradient
      lethal_cost: 254

# 4. LOCAL CONTROLLER
# Robot: 0.24m x 0.18m rectangle. Corridor: 0.36m. Clearance: 0.06m/side.
# Polygon footprint for accurate rectangular collision checking.
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.10
      movement_time_allowance: 30.0
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.30
      stateful: True
    # Rotation shim: stop-rotate-go at corners.
    # When path turns > 0.4 rad (~23 deg), robot stops, rotates in place
    # to face the new direction, then drives straight. Clean 90-deg turns.
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      angular_dist_threshold: 0.3     # Rotate in place if path heading > 17 deg off (more sensitive)
      forward_sampling_distance: 0.5  # Look 0.5m ahead — detect corners earlier
      rotate_to_heading_angular_vel: 0.5  # Faster rotation at corners
      max_angular_accel: 0.4
      simulate_ahead_time: 0.8
      # RPP params (drives straight segments between rotations)
      desired_linear_vel: 0.08
      max_angular_vel: 0.3
      max_linear_accel: 0.2
      max_linear_decel: 0.3
      max_angular_accel: 0.2
      lookahead_dist: 0.30
      min_lookahead_dist: 0.20
      max_lookahead_dist: 0.40
      lookahead_time: 1.2
      use_velocity_scaled_lookahead_dist: true
      transform_tolerance: 2.0
      min_approach_linear_velocity: 0.03
      use_collision_detection: false
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_gain: 2.0
      regulated_linear_scaling_min_radius: 0.2
      regulated_linear_scaling_min_speed: 0.03
      allow_reversing: false

# 5. GLOBAL COSTMAP
# Robot: 0.24m wide. Corridor: 0.36m. Clearance: 0.06m per side.
# Polygon footprint: 0.24m x 0.18m rectangle.
# inflation_radius 0.08 = clearance (0.06) + 1 safety cell (0.025).
# cost_scaling 0.5 = cost at edge of clearance: 254*exp(-0.5*0.08) = 244.
# Path is forced to dead center where cost is lowest.
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 0.5
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      footprint: "[[0.09, 0.12], [0.09, -0.12], [-0.09, -0.12], [-0.09, 0.12]]"
      resolution: 0.025
      transform_tolerance: 2.0
      track_unknown_space: true
      always_send_full_costmap: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.15

# 6. LOCAL COSTMAP
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.025
      transform_tolerance: 2.0
      footprint: "[[0.09, 0.12], [0.09, -0.12], [-0.09, -0.12], [-0.09, 0.12]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.15
